# Scenario C — priority under saturation (GCP-native, GMP), RESERVED-vs-OVERFLOW
# priority (via the tier-priority merge policy, #294) plus a pool saturation gate.
#
#  - Per-team quota (redis-quota, `classifying` mode): within quota -> reserved,
#    over quota -> overflow (dispatched, not nacked). Each team carries a `tier`
#    label (premium=interactive, standard=async, batch=batch).
#  - Merge policy (tier-priority): all teams share one pool; requests dispatch in
#    strict (classification x tier) lanes — reserved first, then overflow — and
#    x-gateway-priority is stamped.
#  - POOL-level saturation gate: wait-on-refuse(prometheus-query) on the shared
#    pool; on saturation the pool PARKS (ActionWait) and the merge policy drains
#    the highest lanes first as capacity frees.
#
# PromQL endpoint = the GMP query frontend (manifests/gmp-frontend.yaml).
# NOTE: GMP/Monarch lags real time ~1-2 min, so gates react on that timescale.
ap:
  image:
    # v0.7.2 is the first release that includes pool-level gates (#276).
    repository: ghcr.io/llm-d-incubation/llm-d-async
    tag: "v0.7.2"

  messageQueueImpl: "gcp-pubsub-gated"
  igwBaseURL: "http://IGW_HOST:80"

  prometheusURL: "http://gmp-frontend.NAMESPACE.svc.cluster.local:9090"
  prometheusCacheTTL: "5s"

  requestMergePolicyConfig:
    type: "tier-priority"
    parameters:
      priority_header: "x-gateway-priority"

  gcpPubSub:
    enabled: true
    projectId: "PROJECT_ID"
    resultTopicId: "projects/PROJECT_ID/topics/results"
    topicsConfig:
      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-premium-requests-sub"
        worker_pool_id: "default"
        inference_objective: "latency"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        labels:
          tier: "interactive"
        gate_type: "redis-quota"
        gate_params:
          address: "redis.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          gating_mode: "classifying"
          limit: "2"
          prefix: "quota:"

      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-standard-requests-sub"
        worker_pool_id: "default"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        labels:
          tier: "async"
        gate_type: "redis-quota"
        gate_params:
          address: "redis.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          gating_mode: "classifying"
          limit: "2"
          prefix: "quota:"

      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-batch-requests-sub"
        worker_pool_id: "default"
        inference_objective: "throughput"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        labels:
          tier: "batch"
        gate_type: "redis-quota"
        gate_params:
          address: "redis.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          gating_mode: "classifying"
          limit: "1"
          prefix: "quota:"

  # One shared pool with a saturation gate (wait-on-refuse -> park in-memory).
  workerPools:
    - id: "default"
      workers: 8
      gate_type: "wait-on-refuse"
      gate_params:
        gate: |
          {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/20, 0, 1)","fallback":"1"}}

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  metrics:
    enabled: true
  podMonitor:
    enabled: false
  modelServerMonitor:
    enabled: false
  prometheusRule:
    enabled: false
  grafana:
    dashboards:
      enabled: false
