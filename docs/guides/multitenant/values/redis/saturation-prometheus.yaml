# Redis SortedSet backend + self-hosted Prometheus + Grafana, RESERVED-vs-OVERFLOW
# priority (via the tier-priority merge policy, #294) plus a pool saturation gate.
#
#  - Per-team quota (redis-quota, `classifying` mode): within quota -> reserved,
#    over quota -> overflow (dispatched, not nacked). Each team carries a `tier`
#    label (premium=interactive, standard=async, batch=batch).
#  - Merge policy (tier-priority): all teams share one pool; requests are
#    dispatched in strict (classification x tier) lanes — reserved first
#    (interactive>async>batch), then overflow — and x-gateway-priority is stamped.
#  - POOL-level saturation gate: wait-on-refuse(prometheus-query) on the shared
#    pool. Under saturation the pool PARKS (ActionWait); as capacity frees, the
#    merge policy drains the highest lanes (reserved, high tier) first.
#
# (For a tier-aware saturation gate that treats each lane differently — wait
# reserved, 429 interactive-overflow, refuse async/batch-overflow — see the
# `tier-priority-admission` gate from #294; this overlay keeps the simpler
# wait-on-refuse guard.)
#
# prometheusURL points at the in-cluster kube-prometheus-stack Prometheus.
# vLLM is scraped by manifests/prometheus-vllm-podmonitor.yaml.
ap:
  image:
    # v0.7.2 is the first release that includes pool-level gates (#276).
    repository: ghcr.io/llm-d-incubation/llm-d-async
    tag: "v0.7.2"

  messageQueueImpl: "redis-sortedset"
  igwBaseURL: "http://IGW_HOST:80"

  # PromQL endpoint for the saturation pool gate.
  prometheusURL: "http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
  prometheusCacheTTL: "5s"

  requestMergePolicyConfig:
    type: "tier-priority"
    parameters:
      priority_header: "x-gateway-priority"

  redis:
    enabled: true
    url: "redis://redis.NAMESPACE.svc.cluster.local:6379"
    resultQueueName: "results-list"
    pollIntervalMs: 500
    batchSize: 10
    queuesConfig:
      - queue_name: "team-premium-requests"
        worker_pool_id: "default"
        inference_objective: "latency"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        labels:
          tier: "interactive"
        gate_type: "redis-quota"
        gate_params:
          address: "redis.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          gating_mode: "classifying"
          limit: "2"
          prefix: "quota:"

      - queue_name: "team-standard-requests"
        worker_pool_id: "default"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        labels:
          tier: "async"
        gate_type: "redis-quota"
        gate_params:
          address: "redis.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          gating_mode: "classifying"
          limit: "2"
          prefix: "quota:"

      - queue_name: "team-batch-requests"
        worker_pool_id: "default"
        inference_objective: "throughput"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        labels:
          tier: "batch"
        gate_type: "redis-quota"
        gate_params:
          address: "redis.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          gating_mode: "classifying"
          limit: "1"
          prefix: "quota:"

  # One shared pool with a saturation gate: wait-on-refuse wraps a prometheus-query
  # budget so an over-saturation refuse becomes ActionWait (park in-memory).
  workerPools:
    - id: "default"
      workers: 8
      gate_type: "wait-on-refuse"
      gate_params:
        gate: |
          {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/20, 0, 1)","fallback":"1"}}

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # Self-hosted Prometheus/Grafana observability (prometheus-operator native).
  metrics:
    enabled: true
  podMonitor:
    enabled: true
    interval: "15s"
  modelServerMonitor:
    enabled: false
  prometheusRule:
    enabled: true
  grafana:
    dashboards:
      enabled: true
