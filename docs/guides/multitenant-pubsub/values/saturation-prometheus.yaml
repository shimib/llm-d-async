# Self-hosted Prometheus + Grafana observability path (alternative to GMP).
#
# Same multi-tenant setup as the GMP scenario-c config, but:
#  - prometheusURL points at the in-cluster kube-prometheus-stack Prometheus
#    (real-time, no Monarch ingestion lag), and
#  - the chart's native prometheus-operator observability is turned ON:
#    podMonitor (AP metrics), prometheusRule (alerts), and the bundled Grafana
#    dashboard (auto-imported by the kube-prometheus-stack Grafana sidecar).
#
# vLLM is scraped by manifests/prometheus-vllm-podmonitor.yaml (not the chart's
# modelServerMonitor, whose default selector doesn't match this stack's pod).
ap:
  image:
    repository: ghcr.io/llm-d-incubation/llm-d-async
    tag: "v0.7.1"

  messageQueueImpl: "gcp-pubsub-gated"
  igwBaseURL: "http://IGW_HOST:80"

  # PromQL endpoint = the in-cluster kube-prometheus-stack Prometheus.
  prometheusURL: "http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
  prometheusCacheTTL: "5s"

  gcpPubSub:
    enabled: true
    projectId: "PROJECT_ID"
    resultTopicId: "projects/PROJECT_ID/topics/results"
    topicsConfig:
      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-premium-requests-sub"
        worker_pool_id: "premium"
        inference_objective: "latency"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        gate_type: "prometheus-query"
        gate_params:
          query: "clamp(1 - sum(vllm:num_requests_running)/40, 0, 1)"
          fallback: "1"

      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-standard-requests-sub"
        worker_pool_id: "standard"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        gate_type: "composite"
        gate_params:
          gates: |
            [
              {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/20, 0, 1)","fallback":"1"}},
              {"gate_type":"redis-quota","gate_params":{"address":"redis-quota.NAMESPACE.svc.cluster.local:6379","attribute":"team","mode":"concurrency","limit":"20","prefix":"quota:"}}
            ]

      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-batch-requests-sub"
        worker_pool_id: "batch"
        inference_objective: "throughput"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        gate_type: "composite"
        gate_params:
          gates: |
            [
              {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/8, 0, 1)","fallback":"1"}},
              {"gate_type":"redis-quota","gate_params":{"address":"redis-quota.NAMESPACE.svc.cluster.local:6379","attribute":"team","mode":"concurrency","limit":"2","prefix":"quota:"}}
            ]

  workerPools:
    - id: "premium"
      workers: 16
    - id: "standard"
      workers: 8
    - id: "batch"
      workers: 4

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # Self-hosted Prometheus/Grafana observability (prometheus-operator native).
  metrics:
    enabled: true
  podMonitor:
    enabled: true          # scrape AP metrics into Prometheus
    interval: "15s"
  modelServerMonitor:
    enabled: false         # vLLM scraped by manifests/prometheus-vllm-podmonitor.yaml instead
  prometheusRule:
    enabled: true          # AP alert rules
  grafana:
    dashboards:
      enabled: true        # bundled Async Processor dashboard, auto-imported by Grafana sidecar
