# Scenario C — priority under saturation (GCP-native, GMP), using BOTH gate
# levels (#276):
#
#  - QUEUE-level gate (per topic): redis-quota — per-team fairness quota; nacks
#    over-quota messages back to the broker.
#  - POOL-level gate (per worker pool): wait-on-refuse(prometheus-query) — the
#    shared inference-saturation guard; on refuse the worker PARKS in-memory
#    (ActionWait) instead of nacking. Premium tolerates the most load (N=40),
#    batch the least (N=8), so under saturation batch parks first while premium
#    keeps dispatching.
#
# PromQL endpoint = the GMP query frontend (manifests/gmp-frontend.yaml).
# NOTE: GMP/Monarch lags real time ~1-2 min, so gates react on that timescale.
ap:
  image:
    # Pool-level gates need the binary from PR #276. Pin a release/commit image
    # that includes it — v0.7.1 predates #276 and silently ignores pool gate_type.
    repository: ghcr.io/llm-d-incubation/llm-d-async
    tag: "v0.7.1"   # TODO: bump to the first published tag containing #276

  messageQueueImpl: "gcp-pubsub-gated"
  igwBaseURL: "http://IGW_HOST:80"

  prometheusURL: "http://gmp-frontend.NAMESPACE.svc.cluster.local:9090"
  prometheusCacheTTL: "5s"

  gcpPubSub:
    enabled: true
    projectId: "PROJECT_ID"
    resultTopicId: "projects/PROJECT_ID/topics/results"
    topicsConfig:
      # premium: no queue gate (priority handled by its pool gate below).
      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-premium-requests-sub"
        worker_pool_id: "premium"
        inference_objective: "latency"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"

      # standard: queue-level per-team quota.
      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-standard-requests-sub"
        worker_pool_id: "standard"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        gate_type: "redis-quota"
        gate_params:
          address: "redis-quota.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          limit: "20"
          prefix: "quota:"

      # batch: tight queue-level quota.
      - subscriber_id: "projects/PROJECT_ID/subscriptions/team-batch-requests-sub"
        worker_pool_id: "batch"
        inference_objective: "throughput"
        request_path_url: "/v1/completions"
        igw_base_url: "http://IGW_HOST:80"
        gate_type: "redis-quota"
        gate_params:
          address: "redis-quota.NAMESPACE.svc.cluster.local:6379"
          attribute: "team"
          mode: "concurrency"
          limit: "2"
          prefix: "quota:"

  # POOL-level saturation gates (wait-on-refuse -> park in-memory on saturation).
  workerPools:
    - id: "premium"
      workers: 16
      gate_type: "wait-on-refuse"
      gate_params:
        gate: |
          {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/40, 0, 1)","fallback":"1"}}
    - id: "standard"
      workers: 8
      gate_type: "wait-on-refuse"
      gate_params:
        gate: |
          {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/20, 0, 1)","fallback":"1"}}
    - id: "batch"
      workers: 4
      gate_type: "wait-on-refuse"
      gate_params:
        gate: |
          {"gate_type":"prometheus-query","gate_params":{"query":"clamp(1 - sum(vllm:num_requests_running)/8, 0, 1)","fallback":"1"}}

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  metrics:
    enabled: true
  podMonitor:
    enabled: false
  modelServerMonitor:
    enabled: false
  prometheusRule:
    enabled: false
  grafana:
    dashboards:
      enabled: false
