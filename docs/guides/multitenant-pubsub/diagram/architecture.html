<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>llm-d Async Processor — Multi-tenant Pub/Sub demo</title>
<style>
  :root{
    --bg:#0b1020; --panel:#141d33; --panel2:#0f1730; --stroke:#2f4068;
    --ink:#e6edf7; --muted:#93a6c9; --wire:#6f8ad0;
    --premium:#8b7bff; --standard:#2dd4bf; --batch:#f5a623;
    --ok:#37d67a; --bad:#ff5d6c; --warn:#ffcc4d;
    /* one shared loop period — every timed effect uses % of this, so all stay in sync */
    --loop:20s;
  }
  html,body{margin:0;background:radial-gradient(1200px 700px at 30% 10%, #131d38 0%, var(--bg) 60%);}
  .wrap{width:1280px;height:760px;margin:0 auto;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  text{fill:var(--ink);font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  .title{font-size:26px;font-weight:700;letter-spacing:.3px;}
  .sub{font-size:13px;fill:var(--muted);}
  .lbl{font-size:13px;} .small{font-size:11px;fill:var(--muted);} .tag{font-size:11px;fill:var(--muted);}
  .node{fill:var(--panel);stroke:var(--stroke);stroke-width:1.5;rx:12;filter:url(#soft);}
  .wire{fill:none;stroke:var(--wire);stroke-width:2.4;}
  .wire.dim{stroke:#3a4f7d;stroke-width:2;stroke-dasharray:5 6;}

  .dot{filter:url(#glow);}
  .dot.premium{fill:var(--premium);} .dot.standard{fill:var(--standard);} .dot.batch{fill:var(--batch);}

  /* batch flow halts while its gate is closed; standard partially throttles */
  @keyframes batchFlow{0%,33%{opacity:1} 40%,70%{opacity:0} 78%,100%{opacity:1}}
  @keyframes stdFlow{0%,42%{opacity:1} 52%,66%{opacity:.12} 76%,100%{opacity:1}}
  .batchdot{animation:batchFlow var(--loop) linear infinite;}
  .stddot{animation:stdFlow var(--loop) linear infinite;}

  /* gate state open(green) -> closed(red) on the same timeline */
  @keyframes gateBatch{0%,33%{fill:var(--ok)}40%,70%{fill:var(--bad)}78%,100%{fill:var(--ok)}}
  @keyframes gateStd{0%,42%{fill:var(--ok)}52%,66%{fill:var(--warn)}76%,100%{fill:var(--ok)}}
  .gate-batch{animation:gateBatch var(--loop) steps(1) infinite;}
  .gate-std{animation:gateStd var(--loop) steps(1) infinite;}
  @keyframes showWhenClosed{0%,33%{opacity:0}40%,70%{opacity:1}78%,100%{opacity:0}}
  .gate-batch-closed{animation:showWhenClosed var(--loop) steps(1) infinite;}
  @keyframes showWhenOpen{0%,33%{opacity:1}40%,70%{opacity:0}78%,100%{opacity:1}}
  .gate-batch-open{animation:showWhenOpen var(--loop) steps(1) infinite;}

  /* vLLM saturation meter fills then drains; batch backlog grows while throttled */
  @keyframes sat{0%{height:8px;fill:var(--ok)}33%{height:80px;fill:var(--warn)}
                 55%{height:120px;fill:var(--bad)}82%{height:42px;fill:var(--warn)}100%{height:8px;fill:var(--ok)}}
  .satbar{animation:sat var(--loop) ease-in-out infinite;}
  @keyframes backlog{0%,33%{height:0px}55%{height:92px}70%{height:92px}90%,100%{height:0px}}
  .backlogbar{animation:backlog var(--loop) ease-in-out infinite;}
  @keyframes quotaPulse{0%,33%{opacity:.25}42%,70%{opacity:1}82%,100%{opacity:.25}}
  .quota-hot{animation:quotaPulse var(--loop) ease-in-out infinite;}

  .flowline{stroke-dasharray:4 8;animation:dash 2.6s linear infinite;}
  @keyframes dash{to{stroke-dashoffset:-24}}
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1280 760" width="1280" height="760" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--wire)"/></marker>
    <marker id="ahd" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#3a4f7d"/></marker>

    <!-- dot motion paths == the visible connector geometry, so dots ride the wires exactly -->
    <path id="laneP" d="M150,170 H810 C870,170 870,360 905,360 H1085"/>
    <path id="laneS" d="M150,360 H1085"/>
    <path id="laneB" d="M150,560 H810 C870,560 870,360 905,360 H1085"/>
  </defs>

  <!-- header -->
  <text class="title" x="40" y="48">llm-d Async Processor — multi-tenant Pub/Sub</text>
  <text class="sub" x="40" y="70">per-team subscriptions · worker pools · quota + saturation gates · priority under load</text>

  <!-- ============ CONNECTORS (arrowed, between adjacent stages) ============ -->
  <g>
    <!-- premium row (y=170) -->
    <path class="wire" d="M150,170 H244"  marker-end="url(#ah)"/>
    <path class="wire" d="M370,170 H402"  marker-end="url(#ah)"/>
    <path class="wire" d="M504,170 H534"  marker-end="url(#ah)"/>
    <path class="wire" d="M660,170 H684"  marker-end="url(#ah)"/>
    <path class="wire" d="M810,170 C870,170 870,360 899,360" marker-end="url(#ah)"/>
    <!-- standard row (y=360) -->
    <path class="wire" d="M150,360 H244"  marker-end="url(#ah)"/>
    <path class="wire" d="M370,360 H402"  marker-end="url(#ah)"/>
    <path class="wire" d="M504,360 H534"  marker-end="url(#ah)"/>
    <path class="wire" d="M660,360 H684"  marker-end="url(#ah)"/>
    <path class="wire" d="M810,360 H899"  marker-end="url(#ah)"/>
    <!-- batch row (y=560) -->
    <path class="wire" d="M150,560 H244"  marker-end="url(#ah)"/>
    <path class="wire" d="M370,560 H402"  marker-end="url(#ah)"/>
    <path class="wire" d="M504,560 H534"  marker-end="url(#ah)"/>
    <path class="wire" d="M660,560 H684"  marker-end="url(#ah)"/>
    <path class="wire" d="M810,560 C870,560 870,360 899,360" marker-end="url(#ah)"/>
    <!-- gateway -> vLLM -->
    <path class="wire" d="M1025,360 H1079" marker-end="url(#ah)"/>
  </g>

  <!-- ============ FLOWING DOTS (under the boxes: show only on the wires) ============ -->
  <g class="dot premium">
    <circle r="6"><animateMotion dur="5s" begin="0s"   repeatCount="indefinite"><mpath xlink:href="#laneP"/></animateMotion></circle>
    <circle r="6"><animateMotion dur="5s" begin="1.7s" repeatCount="indefinite"><mpath xlink:href="#laneP"/></animateMotion></circle>
    <circle r="6"><animateMotion dur="5s" begin="3.4s" repeatCount="indefinite"><mpath xlink:href="#laneP"/></animateMotion></circle>
  </g>
  <g class="dot standard">
    <circle r="6" class="stddot"><animateMotion dur="5s" begin="0.8s" repeatCount="indefinite"><mpath xlink:href="#laneS"/></animateMotion></circle>
    <circle r="6" class="stddot"><animateMotion dur="5s" begin="2.5s" repeatCount="indefinite"><mpath xlink:href="#laneS"/></animateMotion></circle>
    <circle r="6" class="stddot"><animateMotion dur="5s" begin="4.2s" repeatCount="indefinite"><mpath xlink:href="#laneS"/></animateMotion></circle>
  </g>
  <g class="dot batch">
    <circle r="6" class="batchdot"><animateMotion dur="5s" begin="0.3s" repeatCount="indefinite"><mpath xlink:href="#laneB"/></animateMotion></circle>
    <circle r="6" class="batchdot"><animateMotion dur="5s" begin="2.0s" repeatCount="indefinite"><mpath xlink:href="#laneB"/></animateMotion></circle>
    <circle r="6" class="batchdot"><animateMotion dur="5s" begin="3.7s" repeatCount="indefinite"><mpath xlink:href="#laneB"/></animateMotion></circle>
  </g>

  <!-- ============ NODES (drawn over the wires + dots) ============ -->
  <!-- publishers -->
  <g>
    <rect class="node" x="30" y="142" width="120" height="56"/><text class="lbl" x="44" y="166" style="fill:var(--premium)">premium</text><text class="small" x="44" y="184">publisher</text>
    <rect class="node" x="30" y="332" width="120" height="56"/><text class="lbl" x="44" y="356" style="fill:var(--standard)">standard</text><text class="small" x="44" y="374">publisher</text>
    <rect class="node" x="30" y="532" width="120" height="56"/><text class="lbl" x="44" y="556" style="fill:var(--batch)">batch</text><text class="small" x="44" y="574">publisher</text>
  </g>

  <!-- pub/sub topics -->
  <g>
    <text class="tag" x="250" y="120">GCP Pub/Sub topics</text>
    <rect class="node" x="250" y="148" width="120" height="44"/><text class="small" x="262" y="174">team-premium</text>
    <rect class="node" x="250" y="338" width="120" height="44"/><text class="small" x="262" y="364">team-standard</text>
    <rect class="node" x="250" y="538" width="120" height="44"/><text class="small" x="262" y="564">team-batch</text>
    <text class="small" x="250" y="610" style="fill:var(--muted)">msg attr: team=&lt;tier&gt;</text>
  </g>

  <!-- async processor -->
  <rect x="392" y="96" width="470" height="556" rx="16" fill="var(--panel2)" stroke="var(--stroke)" stroke-width="1.5"/>
  <text class="tag" x="408" y="120" style="fill:var(--ink)">Async Processor  ·  gcp-pubsub-gated</text>
  <rect class="node" x="408" y="150" width="96" height="40"/><text class="small" x="420" y="174">sub</text>
  <rect class="node" x="408" y="340" width="96" height="40"/><text class="small" x="420" y="364">sub</text>
  <rect class="node" x="408" y="540" width="96" height="40"/><text class="small" x="420" y="564">sub</text>
  <rect class="node" x="540" y="146" width="120" height="48"/><text class="small" x="552" y="166">worker pool</text><text class="lbl" x="552" y="184" style="fill:var(--premium)">16 workers</text>
  <rect class="node" x="540" y="336" width="120" height="48"/><text class="small" x="552" y="356">worker pool</text><text class="lbl" x="552" y="374" style="fill:var(--standard)">8 workers</text>
  <rect class="node" x="540" y="536" width="120" height="48"/><text class="small" x="552" y="556">worker pool</text><text class="lbl" x="552" y="574" style="fill:var(--batch)">4 workers</text>

  <!-- gates -->
  <rect class="node" x="690" y="146" width="120" height="48"/>
  <circle cx="708" cy="170" r="7" fill="var(--ok)"/><text class="small" x="724" y="166">gate</text><text class="small" x="724" y="183" style="fill:var(--ok)">OPEN</text>

  <rect class="node" x="690" y="336" width="120" height="48"/>
  <circle cx="708" cy="360" r="7" class="gate-std"/><text class="small" x="724" y="356">gate · quota 20</text><text class="small" x="724" y="373">+ saturation</text>

  <rect class="node" x="690" y="536" width="120" height="48"/>
  <circle cx="708" cy="560" r="7" class="gate-batch"/><text class="small" x="724" y="556">gate · quota 2</text>
  <text class="small gate-batch-open"   x="724" y="573" style="fill:var(--ok)">OPEN</text>
  <text class="small gate-batch-closed" x="724" y="573" style="fill:var(--bad)">CLOSED ✕</text>

  <!-- batch backlog bar (grows while throttled) -->
  <rect x="468" y="592" width="14" height="0" rx="3" fill="var(--bad)" class="backlogbar" transform="scale(1,-1)" transform-origin="468 592"/>
  <text class="small" x="430" y="610" style="fill:var(--bad)">backlog ▲</text>

  <!-- side inputs -->
  <rect class="node" x="690" y="648" width="120" height="44"/><text class="small" x="702" y="668">Redis</text><text class="small" x="702" y="684" style="fill:var(--muted)">quota counters</text>
  <path class="wire dim flowline" d="M750,648 V596" marker-end="url(#ahd)"/>
  <circle cx="770" cy="676" r="6" fill="var(--batch)" class="quota-hot"/><text class="small quota-hot" x="782" y="680" style="fill:var(--batch)">team=batch ≥ 2</text>

  <rect class="node" x="900" y="36" width="184" height="44"/><text class="small" x="914" y="56">Prometheus / GMP</text><text class="small" x="914" y="72" style="fill:var(--muted)">vllm:num_requests_running</text>
  <path class="wire dim flowline" d="M958,80 C910,120 858,126 814,158" marker-end="url(#ahd)"/>
  <text class="small" x="828" y="120" style="fill:var(--muted)">saturation</text>

  <!-- gateway + vLLM -->
  <rect class="node" x="905" y="330" width="120" height="60"/><text class="small" x="918" y="356">Inference</text><text class="small" x="918" y="372">Gateway · EPP</text>
  <rect class="node" x="1085" y="300" width="150" height="120"/>
  <text class="small" x="1100" y="324">vLLM</text><text class="small" x="1100" y="340" style="fill:var(--muted)">Llama-3.1-8B</text>
  <rect x="1190" y="316" width="22" height="92" rx="4" fill="#0b1226" stroke="var(--stroke)"/>
  <rect x="1190" y="408" width="22" height="8" rx="3" class="satbar" transform="scale(1,-1)" transform-origin="1190 408"/>
  <text class="small" x="1100" y="404" style="fill:var(--muted)">saturation</text>
  <path class="wire dim" d="M1150,300 C1150,170 1080,110 1010,82" marker-end="url(#ahd)"/>

  <!-- results return + observability -->
  <path class="wire dim" d="M1160,420 C1160,724 720,724 372,722" marker-end="url(#ahd)"/>
  <rect class="node" x="250" y="702" width="124" height="40"/><text class="small" x="262" y="726">results ▸ consumers</text>
  <rect class="node" x="1085" y="648" width="150" height="50"/><text class="small" x="1098" y="670">Grafana /</text><text class="small" x="1098" y="686">Cloud Monitoring</text>
  <path class="wire dim" d="M862,628 C980,652 1010,660 1085,668"/>

  <!-- legend -->
  <g transform="translate(40,724)">
    <circle cx="6" cy="-4" r="5" fill="var(--premium)"/><text class="small" x="18" y="0">premium</text>
    <circle cx="96" cy="-4" r="5" fill="var(--standard)"/><text class="small" x="108" y="0">standard</text>
    <circle cx="186" cy="-4" r="5" fill="var(--batch)"/><text class="small" x="198" y="0">batch</text>
  </g>
</svg>
</div>
</body>
</html>
