apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "async-processor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "async-processor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "async-processor.selectorLabels" . | nindent 6 }}
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "async-processor.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /async-processor
        args:
          {{- if .Values.ap.redis.enabled }}
          {{- if eq (.Values.ap.messageQueueImpl | default "redis-pubsub") "redis-sortedset" }}
          - --message-queue-impl=redis-sortedset
          {{- if and .Values.ap.redis.queuesConfig .Values.ap.redis.gateType }}
          {{- fail "Cannot set both queuesConfig and gateType. Use queuesConfig with per-queue gate_type instead." }}
          {{- end }}
          {{- if .Values.ap.redis.queuesConfig }}
          - --redis.ss.queues-config
          - {{ .Values.ap.redis.queuesConfig | toJson | quote }}
          {{- else }}
          - --redis.ss.igw-base-url={{ .Values.ap.igwBaseURL }}
          - --redis.ss.request-path-url
          - "{{ .Values.ap.redis.requestPathURL }}"
          - --redis.ss.request-queue-name
          - "{{ .Values.ap.redis.requestQueueName | default "request-sortedset" }}"
          {{- if .Values.ap.redis.gateType }}
          - --redis.ss.gate-type={{ .Values.ap.redis.gateType }}
          - --redis.ss.gate-params={{ include "async-processor.gateParamsJson" . }}
          {{- end }}
          {{- end }}
          - --redis.ss.result-queue-name
          - "{{ .Values.ap.redis.resultQueueName | default "result-list" }}"
          - --redis.ss.poll-interval-ms
          - "{{ .Values.ap.redis.pollIntervalMs | default 1000 }}"
          - --redis.ss.batch-size
          - "{{ .Values.ap.redis.batchSize | default 10 }}"
          {{- else }}
          - --message-queue-impl=redis-pubsub
          {{- if .Values.ap.redis.queuesConfig }}
          - --redis.queues-config
          - {{ .Values.ap.redis.queuesConfig | toJson | quote }}
          {{- else }}
          - --redis.igw-base-url={{ .Values.ap.igwBaseURL }}
          - --redis.request-path-url
          - "{{ .Values.ap.redis.requestPathURL }}"
          {{- end }}
          {{- end }}
          {{- else if .Values.ap.gcpPubSub.enabled }}
          - --message-queue-impl=gcp-pubsub
          - --pubsub.igw-base-url={{ .Values.ap.igwBaseURL }}
          - --pubsub.request-subscriber-id={{ .Values.ap.gcpPubSub.requestSubscriberId }}
          - --pubsub.result-topic-id={{ .Values.ap.gcpPubSub.resultTopicId }}
          - --pubsub.request-path-url
          - "{{ .Values.ap.gcpPubSub.requestPathURL }}"
          {{- end }}
          {{- if .Values.ap.prometheusURL }}
          - --prometheus-url={{ .Values.ap.prometheusURL }}
          {{- end }}
          {{- if .Values.ap.prometheusCacheTTL }}
          - --prometheus-cache-ttl={{ .Values.ap.prometheusCacheTTL }}
          {{- end }}
          - --concurrency={{ .Values.ap.concurrency | default 8 }}
          - --drain-timeout={{ .Values.ap.drainTimeout | default "2m" }}
          - --metrics-endpoint-auth={{ .Values.ap.metrics.secure }}
          - --metrics-port={{ .Values.ap.metrics.port | default 9090 }}
          {{- if and .Values.ap.otel.redisTracing .Values.ap.otel.endpoint }}
          - --redis-tracing=true
          {{- end }}
          {{- if .Values.ap.tls.insecureSkipVerify }}
          - --tls-insecure-skip-verify=true
          {{- end }}
          {{- if .Values.ap.tls.caCertKey }}
          - --tls-ca-cert=/etc/tls/{{ .Values.ap.tls.caCertKey }}
          {{- end }}
          {{- if and .Values.ap.tls.certKey .Values.ap.tls.keyKey }}
          - --tls-cert=/etc/tls/{{ .Values.ap.tls.certKey }}
          - --tls-key=/etc/tls/{{ .Values.ap.tls.keyKey }}
          {{- end }}
        image: "{{ .Values.ap.image.repository }}:{{ .Values.ap.image.tag }}"
        imagePullPolicy: "{{ .Values.ap.imagePullPolicy }}"
        env:
          - name: LOG_LEVEL
            value: {{ if .Values.ap.logging }}{{ .Values.ap.logging.level | default "info" | quote }}{{ else }}"info"{{ end }}
          {{- if .Values.ap.otel.endpoint }}
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: {{ .Values.ap.otel.endpoint | quote }}
          - name: OTEL_EXPORTER_OTLP_INSECURE
            value: {{ .Values.ap.otel.insecure | quote }}
          - name: OTEL_TRACES_SAMPLER
            value: {{ .Values.ap.otel.sampler | quote }}
          - name: OTEL_TRACES_SAMPLER_ARG
            value: {{ .Values.ap.otel.samplerArg | quote }}
          - name: OTEL_SERVICE_NAME
            value: "async-processor"
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: "k8s.namespace.name=$(NAMESPACE),k8s.pod.name=$(POD_NAME),service.version={{ .Chart.AppVersion }}"
          {{- end }}
          {{- if .Values.ap.redis.enabled }}
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: {{ include "async-processor.redisSecretName" . }}
                key: {{ include "async-processor.redisSecretKey" . }}
          {{- end }}
        name: async-processor
        ports:
          - name: metrics
            containerPort: {{ .Values.ap.metrics.port | default 9090 }}
            protocol: TCP
        {{- with .Values.ap.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with .Values.ap.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with .Values.ap.tls.secretName }}
        volumeMounts:
          - name: tls-certs
            mountPath: /etc/tls
            readOnly: true
        {{- end }}
      serviceAccountName: {{ include "async-processor.fullname" . }}
      terminationGracePeriodSeconds: 130
      {{- with .Values.ap.tls.secretName }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ . }}
      {{- end }}
