apiVersion: apps/v1
kind: Deployment
metadata:
  name: igw-mock
  namespace: e2e-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: igw-mock
  template:
    metadata:
      labels:
        app: igw-mock
    spec:
      containers:
        - name: igw-mock
          image: e2e-igw-mock:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: inference
            - containerPort: 8081
              name: admin
          readinessProbe:
            httpGet:
              path: /admin/request-log
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: igw-mock
  namespace: e2e-test
spec:
  type: NodePort
  selector:
    app: igw-mock
  ports:
    - name: inference
      port: 80
      targetPort: 8080
    - name: admin
      port: 8081
      targetPort: 8081
      nodePort: 30081
